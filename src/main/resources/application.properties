spring.application.name=eCommerce-api

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ecommerce}
spring.datasource.username=${DB_USER:user}
spring.datasource.password=${DB_PASSWORD:password}

spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:false}

jwt.secret=${JWT_SECRET:my-super-secure-secret-key-that-is-at-least-256-bits-long-for-hs256-algorithm}
jwt.expiration-hours=${JWT_EXPIRATION_HOURS:24}

admin.email=${ADMIN_EMAIL:admin@email.com}
admin.password=${ADMIN_PASSWORD:admin123}
