spring.application.name=eCommerce-api

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ecommerce}
spring.datasource.username=${DB_USER:user}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.open-in-view=false

spring.data.web.pageable.max-page-size=100

jwt.secret=${JWT_SECRET}
jwt.expiration-hours=${JWT_EXPIRATION_HOURS:24}

admin.email=${ADMIN_EMAIL:admin@email.com}
admin.password=${ADMIN_PASSWORD}

logging.level.com.lautarorisso.eCommerce_api=INFO
